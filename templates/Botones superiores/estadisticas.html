<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Wellness - Estadísticas</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="top-bar">

        <div class="left-section">

            <div class="logo-container">

                <div class="books-logo">

                    <div class="book book-1"></div>
                    <div class="book book-2"></div>
                    <div class="book book-3"></div>

                </div>

                <div class="logo-text">

                    <span class="book-title">
                        Book
                    </span>

                    <span class="wellness-title">
                        Wellness
                    </span>

                </div>

            </div>

            <div class="menu-container">

                <button class="curve-btn">
                    Estadística
                </button>

                <button class="curve-btn">
                    Objetivos
                </button>

                <button class="curve-btn">
                    Notas
                </button>

              

            </div>

        </div>

        <button class="user-btn">

            <div class="user-icon">

                <div class="user-head"></div>

                <div class="user-body"></div>

            </div>

        </button>

    </div>

    <div class="top-divider"></div>

    <main class="main-content">

        <div class="info-cards">

            <div class="card-container-design">
                
                <div class="card-header-brown">
                    ESTADÍSTICAS
                </div>

                <div class="db-diagram-box">
                    
                    <div class="diagram-header">
                        tbl_user_stats
                    </div>

                    <div class="diagram-body">
                        
                        <div class="diagram-row">
                            <span class="diag-field font-bold">paginas_leidas</span>
                            <span class="diag-type">INT</span>
                            <span class="diag-key font-bold text-value">1,245</span>
                        </div>

                        <div class="diagram-row">
                            <span class="diag-field font-bold">gustos_reg</span>
                            <span class="diag-type">VARCHAR</span>
                            <span class="diag-key font-bold text-value">Fantasía, Sci-Fi</span>
                        </div>

                        <div class="diagram-row">
                            <span class="diag-field font-bold">racha_maxima</span>
                            <span class="diag-type">STREAK</span>
                            <span class="diag-key font-bold text-value">24 días</span>
                        </div>

                        <div class="diagram-row">
                            <span class="diag-field font-bold">estado_animo</span>
                            <span class="diag-type">MOOD</span>
                            <span class="diag-key font-bold text-value">😊 Motivado</span>
                        </div>

                    </div>

                </div>

            </div>
            </div>

    </main>

</body>
</html>
