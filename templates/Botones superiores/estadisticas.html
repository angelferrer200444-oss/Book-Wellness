<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Wellness - Estadísticas</title>
    
    <!-- CSS PRINCIPAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <!-- CSS ESTADISTICAS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles estadisticas.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="top-bar">

        <div class="left-section">

            <div class="logo-container">

                <div class="books-logo">
                    <div class="book book-1"></div>
                    <div class="book book-2"></div>
                    <div class="book book-3"></div>
                </div>

                <div class="logo-text">
                    <span class="book-title">Book</span>
                    <span class="wellness-title">Wellness</span>
                </div>

            </div>

            <div class="menu-container">

                <a href="{{ url_for('estadisticas') }}" class="curve-btn">
                    Estadísticas
                </a>

                <a href="{{ url_for('objetivo') }}" class="curve-btn">
                    Objetivos
                </a>

                <a href="{{ url_for('notas') }}" class="curve-btn">
                    Notas
                </a>                

                <a href="{{ url_for('leidos') }}" class="curve-btn">
                    Leídos
                </a>

            </div>

        </div>

        <button class="user-btn">
            <div class="user-icon">
                <div class="user-head"></div>
                <div class="user-body"></div>
            </div>
        </button>

    </div>

    <div class="top-divider"></div>

    <main class="main-content">

        <div class="back-btn-container">
            <button onclick="history.back()" class="back-circle-btn" aria-label="Volver atrás">
                &larr;
            </button>
        </div>

        <div class="main-dashboard-card">
            
            <div class="dashboard-header">
                ESTADÍSTICAS DEL USUARIO
            </div>

            <div class="dashboard-body">

                <div class="dashboard-row">
                    <div class="row-left">
                        <span class="row-icon">📖</span>
                        <span class="row-label">Páginas Leídas</span>
                    </div>
                    <span class="row-value">1,245</span>
                </div>

                <div class="dashboard-row highlight-row">
                    <div class="row-left">
                        <span class="row-icon">🔥</span>
                        <span class="row-label">Racha Máxima</span>
                    </div>
                    <span class="row-value">24 Días</span>
                </div>

                <div class="dashboard-row">
                    <div class="row-left">
                        <span class="row-icon">😊</span>
                        <span class="row-label">Estado de Ánimo</span>
                    </div>
                    <span class="row-value">Motivado</span>
                </div>

                <div class="dashboard-row">
                    <div class="row-left">
                        <span class="row-icon">🎯</span>
                        <span class="row-label">Géneros Preferidos</span>
                    </div>
                    <div class="tags-container">
                        <span class="tag">Fantasía</span>
                        <span class="tag">Sci-Fi</span>
                    </div>
                </div>

            </div>

        </div>

    </main>

</body>
</html>
