<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Detalle Libro</title>

    <!-- CSS GENERAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <!-- CSS DETALLE -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/detalle-libro.css') }}">

    <!-- FUENTE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

</head>


<body>

    <!-- BARRA SUPERIOR -->
    <div class="top-bar">

        <!-- IZQUIERDA -->
        <div class="left-section">

            <!-- LOGO -->
            <div class="logo-container">

                <div class="books-logo">

                    <div class="book book-1"></div>
                    <div class="book book-2"></div>
                    <div class="book book-3"></div>

                </div>

                <div class="logo-text">

                    <span class="book-title">
                        Book
                    </span>

                    <span class="wellness-title">
                        Wellness
                    </span>

                </div>

            </div>

            <div class="menu-container">

                <a href="{{ url_for('estadisticas') }}" class="curve-btn">
                    Estadísticas
                </a>

                <a href="{{ url_for('objetivo') }}" class="curve-btn">
                    Objetivos
                </a>

                <a href="{{ url_for('notas') }}" class="curve-btn">
                    Notas
                </a>                

                <a href="{{ url_for('leidos') }}" class="curve-btn">
                    Leídos
                </a>

            </div>

        </div>

        <!-- BOTÓN USUARIO -->
        <div class="user-menu-container">

            <button class="user-btn" id="btn-usuario">
        
                <div class="user-icon">
        
                    <div class="user-head"></div>
        
                    <div class="user-body"></div>
        
                </div>
        
            </button>
        
            <div
                class="user-dropdown"
                id="user-dropdown"
                style="display:none;"
            >
        
                <p id="nombre-usuario-dropdown">
                    Usuario
                </p>
        
                <hr>
        
                <button id="btn-logout">
                    Cerrar sesión
                </button>
        
            </div>
        
        </div>

    </div>

    <!-- DIVISOR -->
    <div class="top-divider"></div>

    <!-- CONTENIDO -->
    <div class="book-detail-container">

        <!-- IZQUIERDA -->
        <div class="book-cover-section">

            <button class="back-btn" onclick="history.back()">
                ←
            </button>

            <div class="detail-book-card">

                <img 
                src="{{ portada }}"
                alt="{{ titulo }}"
                id="img-portada"
         >
            </div>

        </div>

        <!-- DERECHA -->
        <div class="book-info-section">

            <div id="cabecera-libro">

                <div class="loader-cabecera">
            
                    <div class="loader loader-grande"></div>
            
                    <span id="texto-carga-cabecera">
                        Consultando catálogo...
                    </span>
            
                </div>
            
            </div>                        

            <!-- BOTONES -->
            <div class="detail-buttons">

                <button class="read-btn"id="btn-leyendo">
                    Leyendo
                </button>

                <button class="soon-btn" id="btn-pendiente">
                    Pendiente a leer
                </button>

            </div>

            <!-- INFO -->
            <div class="book-extra-info">

                <div class="info-block">

                    <h4>
                        Descripción
                    </h4>

                    <div id="descripcion">

                        <div class="loader-container">
                            <div class="loader"></div>
                            <span id="texto-carga">
                                Buscando ejemplar...
                            </span>
                        </div>
                    </div>                                        

                </div>

                <div class="info-grid">

                    <div class="mini-info">

                        <h4>Páginas</h4>
                    
                        <div id="paginas">
                    
                            <div class="loader-container">
                                <div class="loader"></div>
                            </div>
                    
                        </div>
                    
                    </div>
                    
                    <div class="mini-info">
                    
                        <h4>Géneros</h4>
                    
                        <div id="generos">
                    
                            <div class="loader-container">
                                <div class="loader"></div>
                            </div>
                    
                        </div>
                    
                    </div>
                    
                    <div class="mini-info">
                    
                        <h4>País de origen</h4>
                    
                        <div id="pais">
                    
                            <div class="loader-container">
                                <div class="loader"></div>
                            </div>
                    
                        </div>
                    
                    </div>
                    
                    <div class="mini-info">
                    
                        <h4>Año de publicación</h4>
                    
                        <div id="anio">
                    
                            <div class="loader-container">
                                <div class="loader"></div>
                            </div>
                    
                        </div>
                    
                    </div>
                    
                    <div class="mini-info">
                    
                        <h4>Formato</h4>
                    
                        <div id="formato">
                    
                            <div class="loader-container">
                                <div class="loader"></div>
                            </div>
                    
                        </div>
                    
                    </div>                    

                </div>

            </div>

        </div>
            
    </div>

    <script>

   window.datoLibro = {
    portada: "{{ portada }}",
    key: "{{ clave }}",
    id_google: "{{ id_google }}",  
    titulo: "",
    autor: "",
    descripcion: "",
    paginas: null
};
        
    </script>
        
        
<script src="{{ url_for('static', filename='js/detalle-libro.js') }}"></script>
<script src="{{ url_for('static', filename='js/usuario.js') }}"></script>


</body>
</html>
