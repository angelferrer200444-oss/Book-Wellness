<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Wellness</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/agregar.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="top-bar">

        <div class="left-section">

            <div class="logo-container">

                <div class="books-logo">
                    <div class="book book-1"></div>
                    <div class="book book-2"></div>
                    <div class="book book-3"></div>
                </div>

                <div class="logo-text">
                    <span class="book-title">
                        Book
                    </span>
                    <span class="wellness-title">
                        Wellness
                    </span>
                </div>

            </div>

            <div class="menu-container">

                <a href="{{ url_for('estadisticas') }}" class="curve-btn">
                    Estadísticas
                </a>

                <a href="{{ url_for('objetivo') }}" class="curve-btn">
                    Objetivos
                </a>

                <a href="{{ url_for('notas') }}" class="curve-btn">
                    Notas
                </a>                

                <a href="{{ url_for('leidos') }}" class="curve-btn">
                    Leídos
                </a>

            </div>

        </div>

        <button class="user-btn">
            <div class="user-icon">
                <div class="user-head"></div>
                <div class="user-body"></div>
            </div>
        </button>

    </div>

    <div class="top-divider"></div>

    <div class="main-content">
        
        <button class="back-circle-btn" onclick="history.back()" title="Volver atrás">
            ←
        </button>
        
        <div class="form-card">
            
            <div class="form-header">
                <h2>Agregar Nuevo Libro</h2>
                <p class="form-subtitle">Registra un nuevo tomo en los manuscritos de tu biblioteca personal</p>
            </div>

            <form class="book-entry-form" onsubmit="event.preventDefault();">
                
                <div class="form-grid">
                    
                    <div class="form-group animate-field">
                        <label for="book-title">📖 Título del Libro <span class="required">*</span></label>
                        <input type="text" id="book-title" placeholder="Ej. El nombre de la rosa" required>
                    </div>

                    <div class="form-group animate-field">
                        <label for="book-subtitle-field">📜 Subtítulo</label>
                        <input type="text" id="book-subtitle-field" placeholder="Ej. Una novela histórica gótica">
                    </div>
                    
                    <div class="form-group animate-field">
                        <label for="book-author">✒️ Autor <span class="required">*</span></label>
                        <input type="text" id="book-author" placeholder="Nombre del autor" required>
                    </div>
                    
                    <div class="form-group animate-field">
                        <label for="book-type">🗂️ Tipo de Formato</label>
                        <input type="text" id="book-type" placeholder="Ej. Físico, Digital, Audiolibro">
                    </div>

                    <div class="form-group animate-field">
                        <label for="book-pages">📄 Número de Páginas</label>
                        <input type="number" id="book-pages" min="1" placeholder="Ej. 512">
                    </div>

                    <div class="form-group animate-field">
                        <label for="book-chapters">🔖 Número de Capítulos</label>
                        <input type="number" id="book-chapters" min="1" placeholder="Ej. 24">
                    </div>

                    <div class="form-group animate-field">
                        <label for="book-published">📅 Año de Publicación</label>
                        <input type="number" id="book-published" min="0" placeholder="Ej. 1980">
                    </div>
                    
                    <div class="form-group animate-field">
                        <label for="book-genres">🏷️ Géneros y Categorías</label>
                        <input type="text" id="book-genres" placeholder="Ej. Misterio, Novela Histórica, Filosofía">
                    </div>

                </div>

                <div class="form-group full-width">
                    <label>🖼️ Ilustración de Portada</label>
                    <div class="file-upload-zone">
                        <div class="upload-icon">📜</div>
                        <span class="upload-text"><strong>Presiona para examinar tus archivos</strong> o arrastra la imagen aquí</span>
                        <span class="upload-hint">Soporta: PNG, JPG, WEBP • Límite sugerido: 5MB</span>
                        <input type="file" id="book-cover" accept="image/*">
                    </div>
                </div>

                <div class="form-footer">
                    <button type="submit" class="save-book-btn">✨ Agregar Libro</button>
                </div>

            </form>

        </div>

    </div>

</body>
</html>
