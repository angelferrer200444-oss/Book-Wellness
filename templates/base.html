<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            Book Wellness
        {% endblock %}
    </title>

    <!-- CSS GLOBAL -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/styles.css') }}">

    <!-- CSS ESPECÍFICO DE CADA PÁGINA -->
    {% block css %}
    {% endblock %}

    <!-- FUENTES -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <!-- =========================
         BARRA SUPERIOR
    ========================== -->

    <div class="top-bar">

        <!-- IZQUIERDA -->
        <div class="left-section">

            <!-- LOGO -->
            <div class="logo-container">

                <div class="books-logo">

                    <div class="book book-1"></div>
                    <div class="book book-2"></div>
                    <div class="book book-3"></div>

                </div>

                <div class="logo-text">

                    <span class="book-title">
                        Book
                    </span>

                    <span class="wellness-title">
                        Wellness
                    </span>

                </div>

            </div>

            <!-- MENÚ -->
            <div class="menu-container">

                <a href="{{ url_for('estadisticas') }}"
                   class="curve-btn">
                    Estadísticas
                </a>

                <a href="{{ url_for('objetivo') }}"
                   class="curve-btn">
                    Objetivos
                </a>

                <a href="{{ url_for('notas') }}"
                   class="curve-btn">
                    Notas
                </a>

                <a href="{{ url_for('leidos') }}"
                   class="curve-btn">
                    Leídos
                </a>

            </div>

        </div>

        <!-- BOTÓN USUARIO -->
        <div class="user-menu-container">

            <button class="user-btn"
                    id="btn-usuario">

                <div class="user-icon">

                    <div class="user-head"></div>

                    <div class="user-body"></div>

                </div>

            </button>

            <div class="user-dropdown"
                 id="user-dropdown"
                 style="display:none;">

                <p id="nombre-usuario-dropdown">
                    Usuario
                </p>

                <hr>

                <button id="btn-logout">
                    Cerrar sesión
                </button>

            </div>

        </div>

    </div>

    <!-- DIVISOR -->
    <div class="top-divider"></div>

    <!-- =========================
         CONTENIDO DE LA PÁGINA
    ========================== -->

    {% block content %}
    {% endblock %}

    <!-- =========================
         JS GLOBALES
    ========================== -->

    <script src="{{ url_for('static',
    filename='js/usuario.js') }}"></script>

    <!-- JS ESPECÍFICOS DE CADA PÁGINA -->

    {% block js %}
    {% endblock %}

</body>

</html>
